services:
  redis:
    image: redis:8.6
    ports:
      - "6380:6379"   # host 6380 -> container 6379
    networks:
      - lg-shared
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # lg-postgres:
  #   image: postgres:16
  #   environment:
  #     POSTGRES_DB: langgraph
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   networks:
  #     - lg-shared
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U postgres -d langgraph"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 20

  worker:
    build:
      context: .
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - lg-shared
    restart: unless-stopped

networks:
  lg-shared:
    external: true

