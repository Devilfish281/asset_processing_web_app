services:
  redis:
    image: redis:8.6
    ports:
      - "6379:6379"
    networks:
      - apw-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  lg-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: langgraph
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - apw-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d langgraph"]
      interval: 5s
      timeout: 3s
      retries: 20

  worker:
    build:
      context: .
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      lg-postgres:
        condition: service_healthy
    networks:
      - apw-net
    restart: unless-stopped

networks:
  apw-net:
    name: apw-net

volumes:
  pgdata:
