# config.toml

# Recommended if available; otherwise keep "gpt-5.2-codex"
model = "gpt-5.3-codex"
model_reasoning_effort = "xhigh"

# Equivalent of: /approvals -> Agent Full Access
sandbox_mode = "workspace-write"
approval_policy = "never"

# Web search mode (preferred over legacy [features].web_search_request)
web_search = "live"

# If you want outbound network access while in workspace-write sandbox
sandbox_workspace_write.network_access = true

# External notifier program (argv array). Receives a JSON payload from Codex.
notify = ["python", "C:\\Users\\ME\\.codex\\notify.py"]

[features]
shell_tool = true
unified_exec = true
shell_snapshot = true
apply_patch_freeform = true
powershell_utf8 = true

# Windows native sandbox configuration (replaces old experimental flags)
[windows]
sandbox = "elevated"  # fallback: "unelevated"

[tui]
notifications = true

[profiles.fast]
model = "gpt-4.1-mini"
model_reasoning_effort = "medium"
approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "cached"

[shell_environment_policy]
include_only = ["PATH", "HOME"]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]
startup_timeout_sec = 30

[notice.model_migrations]
"gpt-5.1-codex-max" = "gpt-5.2-codex"
